<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Breakout Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 14px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 100; }
        #controls { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; text-shadow: 1px 1px 2px black; }
        #theme-select { position: absolute; top: 10px; right: 10px; z-index: 100; }
        #theme-select select { padding: 8px; border-radius: 5px; border: none; background: rgba(0,0,0,0.7); color: white; cursor: pointer; }
        #level-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; color: white; z-index: 200; display: none; }
        #level-select h2 { margin-bottom: 20px; text-align: center; }
        #level-select button { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #level-select button:hover { background: #555; }
        #editor-toggle { position: absolute; bottom: 10px; right: 10px; padding: 10px 20px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 5px; cursor: pointer; z-index: 100; }
        #editor-toggle:hover { background: rgba(50,50,50,0.9); }
        #level-editor { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; color: white; z-index: 300; display: none; min-width: 400px; }
        #level-editor h2 { margin-bottom: 15px; text-align: center; }
        #level-editor input, #level-editor select { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: calc(100% - 10px); }
        #level-editor button { padding: 12px 24px; margin: 8px 5px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
        #level-editor .save-btn { background: #4CAF50; color: white; }
        #level-editor .cancel-btn { background: #f44336; color: white; }
        .brick-palette { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; justify-content: center; }
        .brick-color { width: 35px; height: 35px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; transition: transform 0.2s; }
        .brick-color:hover { transform: scale(1.1); }
        .brick-color.selected { border-color: white; }
        .brick-grid { display: grid; grid-template-columns: repeat(8, 45px); gap: 6px; margin: 15px 0; justify-content: center; }
        .brick-cell { width: 45px; height: 25px; background: #222; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .brick-cell:hover { background: #444; }
        .brick-cell.filled { border: 2px solid white; }
        #start-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; z-index: 150; }
        #start-screen h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #start-screen p { font-size: 18px; margin-bottom: 30px; opacity: 0.8; }
        #start-screen button { padding: 15px 50px; font-size: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 30px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        #start-screen button:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(102, 126, 234, 0.6); }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
        .hidden { display: none !important; }
        .level-author { font-size: 12px; color: #aaa; display: block; }
        #user-profile { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px; z-index: 100; }
        #user-profile input { padding: 4px; border-radius: 4px; border: none; margin-left: 8px; }
        .level-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .level-btn { flex: 1; text-align: left; padding: 10px 12px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .level-btn:hover { background: #555; }
        .delete-btn { padding: 10px 14px; background: #883333; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { background: #aa4444; }
    </style>
</head>
<body>
    <div id="loading">Loading 3D Breakout...</div>
    <div id="ui"></div>
    <div id="controls">Arrow Keys / A,D: Move | Space: Launch Ball | ESC: Pause</div>
    <div id="user-profile">
        <span>Player:</span>
        <input type="text" id="user-name" placeholder="Your name">
    </div>
    <div id="theme-select">
        <select id="theme" onchange="changeTheme(this.value)">
            <option value="default">Default Theme</option>
            <option value="neon">Neon</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="retro">Retro</option>
            <option value="space">Space</option>
        </select>
    </div>
    <button id="editor-toggle" onclick="toggleLevelEditor()">Level Editor</button>

    <div id="start-screen">
        <h1>3D BREAKOUT</h1>
        <p>Destroy all bricks to win! Collect power-ups for bonus effects.</p>
        <button onclick="showLevelSelect()">START GAME</button>
    </div>

    <div id="level-select">
        <h2>Select Level</h2>
        <div id="level-list"></div>
        <button onclick="hideLevelSelect()" style="background: #666; margin-top: 15px;">Back</button>
    </div>

    <div id="level-editor">
        <h2>Level Editor</h2>
        <input type="text" id="level-name" placeholder="Level Name">
        <div style="margin-top: 10px;">Select Color:</div>
        <div class="brick-palette" id="brick-palette"></div>
        <div style="margin-top: 10px;">Click cells to place/remove bricks:</div>
        <div class="brick-grid" id="brick-grid"></div>
        <div style="text-align: center; margin-top: 15px;">
            <button class="save-btn" onclick="saveCustomLevel()">Save Level</button>
            <button class="cancel-btn" onclick="closeLevelEditor()">Cancel</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    var PhysicsModule = null;
    </script>
    <script src="game.js"></script>
    <script>
        var gameInstance = null;
        const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#ff00ff', '#ffffff'];
        
        // 生成或获取用户 ID
        function getUserId() {
            let userId = localStorage.getItem('breakoutUserId');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('breakoutUserId', userId);
            }
            return userId;
        }
        
        // 获取或设置用户名
        function getUserName() {
            const userName = localStorage.getItem('breakoutUserName') || 'Anonymous';
            document.getElementById('user-name').value = userName;
            return userName;
        }
        
        function setUserName(name) {
            localStorage.setItem('breakoutUserName', name);
        }

        function changeTheme(theme) {
            if (window.gameInstance) {
                window.gameInstance.applyTheme(theme);
            }
        }

        function showLevelSelect() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('level-select').style.display = 'block';
            loadLevels();
        }

        function hideLevelSelect() {
            document.getElementById('level-select').style.display = 'none';
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function toggleLevelEditor() {
            const editor = document.getElementById('level-editor');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
            if (editor.style.display === 'block') {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('level-select').style.display = 'none';
                initLevelEditor();
            }
        }

        function closeLevelEditor() {
            document.getElementById('level-editor').style.display = 'none';
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function initLevelEditor() {
            const palette = document.getElementById('brick-palette');
            palette.innerHTML = '';
            colors.forEach((color, i) => {
                const div = document.createElement('div');
                div.className = 'brick-color' + (i === 0 ? ' selected' : '');
                div.style.background = color;
                div.dataset.color = color;
                div.onclick = () => {
                    document.querySelectorAll('.brick-color').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                };
                palette.appendChild(div);
            });

            const grid = document.getElementById('brick-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const cell = document.createElement('div');
                cell.className = 'brick-cell';
                cell.dataset.index = i;
                cell.dataset.row = Math.floor(i / 8);
                cell.dataset.col = i % 8;
                cell.onclick = () => {
                    const selectedColor = document.querySelector('.brick-color.selected').getAttribute('data-color');
                    if (cell.classList.contains('filled')) {
                        cell.classList.remove('filled');
                        cell.style.background = '#222';
                    } else {
                        cell.classList.add('filled');
                        cell.style.background = selectedColor;
                    }
                };
                grid.appendChild(cell);
            }
        }

        function saveCustomLevel(overwrite = false) {
            const name = document.getElementById('level-name').value || 'Custom Level';
            const bricks = [];
            document.querySelectorAll('.brick-cell.filled').forEach(cell => {
                const color = cell.style.background;
                const rgb = hexToRgb(color);
                const hexColor = rgbToHex(rgb.r, rgb.g, rgb.b);
                bricks.push({
                    row: parseInt(cell.dataset.row),
                    col: parseInt(cell.dataset.col),
                    color: hexColor
                });
            });

            const userId = getUserId();
            const userName = getUserName();

            fetch('/api/levels/user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, bricks, userId, userName, overwrite })
            })
            .then(async res => {
                const data = await res.json();
                if (res.status === 403) {
                    alert(data.error + '\nCreator: ' + data.existingAuthor);
                    return;
                }
                if (res.status === 409) {
                    if (confirm(data.error + '\nClick OK to overwrite.')) {
                        saveCustomLevel(true);
                    }
                    return;
                }
                alert('Level saved!');
                closeLevelEditor();
                loadLevels();
            })
            .catch(err => console.error('Error saving level:', err));
        }

        function loadLevels() {
            fetch('/api/levels')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('level-list');
                    list.innerHTML = '';
                    data.preset.forEach(level => {
                        const item = document.createElement('div');
                        item.className = 'level-item';
                        const btn = document.createElement('button');
                        btn.className = 'level-btn';
                        btn.innerHTML = `${level.name}<span class="level-author">by System</span>`;
                        btn.onclick = () => startLevel(level.id);
                        item.appendChild(btn);
                        list.appendChild(item);
                    });
                    if (data.userCreated.length > 0) {
                        const divider = document.createElement('div');
                        divider.style.margin = '10px 0';
                        divider.style.borderBottom = '1px solid #555';
                        list.appendChild(divider);
                        data.userCreated.forEach(level => {
                            const item = document.createElement('div');
                            item.className = 'level-item';
                            const btn = document.createElement('button');
                            btn.className = 'level-btn';
                            const author = level.userName || 'Anonymous';
                            btn.innerHTML = `${level.name}<span class="level-author">by ${author}</span>`;
                            btn.onclick = () => startLevel(level.id);
                            item.appendChild(btn);

                            const currentUserId = getUserId();
                            if (level.userId === currentUserId) {
                                const deleteBtn = document.createElement('button');
                                deleteBtn.className = 'delete-btn';
                                deleteBtn.textContent = 'Delete';
                                deleteBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    deleteLevel(level.id);
                                };
                                item.appendChild(deleteBtn);
                            }
                            
                            list.appendChild(item);
                        });
                    }
                })
                .catch(err => console.error('Error loading levels:', err));
        }

        function deleteLevel(levelId) {
            if (!confirm('Are you sure you want to delete this level? This cannot be undone.')) {
                return;
            }
            
            const userId = getUserId();
            fetch(`/api/levels/user/${levelId}?userId=${userId}`, {
                method: 'DELETE'
            })
            .then(res => {
                if (res.ok) {
                    alert('Level deleted successfully!');
                    loadLevels();
                } else {
                    res.json().then(data => {
                        alert(data.error || 'Failed to delete level');
                    });
                }
            })
            .catch(err => {
                console.error('Error deleting level:', err);
                alert('Failed to delete level');
            });
        }

        function startLevel(id) {
            document.getElementById('level-select').style.display = 'none';
            if (window.gameInstance) {
                window.gameInstance.startGameWithLevel(id);
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loading').style.display = 'none';
            // 初始化用户名
            getUserName();
            document.getElementById('user-name').addEventListener('change', (e) => {
                setUserName(e.target.value || 'Anonymous');
            });
        });
    </script>
</body>
</html>
